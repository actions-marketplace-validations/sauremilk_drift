# Temporary fallback CI while GitHub-hosted runners are blocked.
# Tracking: https://github.com/sauremilk/drift/issues/90

linux_test_task:
  matrix:
    - name: "pytest (Python 3.11)"
      container:
        image: python:3.11
    - name: "pytest (Python 3.12)"
      container:
        image: python:3.12
    - name: "pytest (Python 3.13)"
      container:
        image: python:3.13

  install_script:
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"

  test_script:
    - python -m pytest tests/ --tb=short --ignore=tests/test_smoke.py -q --maxfail=1
