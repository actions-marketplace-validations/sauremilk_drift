<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#090d12"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6edf3"/>
      <stop offset="45%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="accentline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#38d39f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38d39f" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#dots)"/>
  <rect width="900" height="280" fill="url(#vignette)"/>

  <line x1="0" y1="195" x2="900" y2="195" stroke="url(#accentline)" stroke-width="1"/>

  <text
    x="450" y="168"
    text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace"
    font-size="128"
    font-weight="700"
    letter-spacing="-2"
    fill="url(#wordmark)"
    filter="url(#glow)"
  >drift</text>

  <text
    x="450" y="228"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15.5"
    font-weight="400"
    letter-spacing="2.5"
    fill="#8b949e"
  >STRUCTURAL COHERENCE LAYER FOR AI-ASSISTED PYTHON DEVELOPMENT</text>

  <text
    x="112" y="175"
    text-anchor="middle"
    font-family="'SF Mono', monospace"
    font-size="96"
    font-weight="300"
    fill="#58a6ff"
    fill-opacity="0.12"
  >[</text>

  <text
    x="788" y="175"
    text-anchor="middle"
    font-family="'SF Mono', monospace"
    font-size="96"
    font-weight="300"
    fill="#38d39f"
    fill-opacity="0.12"
  >]</text>

</svg>