name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # NOTE: Uses self-hosted Windows runner (GitHub-hosted runners temporarily unavailable).
    # Migration to ubuntu-latest tracked in: https://github.com/sauremilk/drift/issues/90
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build documentation
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    # NOTE: Uses self-hosted Windows runner (GitHub-hosted runners temporarily unavailable).
    # Migration to ubuntu-latest tracked in: https://github.com/sauremilk/drift/issues/90
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
